<svg xmlns="http://www.w3.org/2000/svg" width="920" height="350" viewBox="0 0 920 350" role="img" aria-label="Two per-user streams. Inside one stream, events from three chats interleave as colored cells identified by routing keys. A marker shows a key-filtered read for chat:cows resuming from offset 8, returning only that chat's events, then following live.">
  <rect width="920" height="350" fill="#fbfbf9"/>
  <style>
    text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif}
    .name{fill:#1a1a1e;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:13.5px}
    .note{fill:#9494a0;font-size:12.5px}
    .lab{fill:#27865a;font-size:13px;font-weight:600}
    .lane{fill:#ffffff;stroke:#cfcfca;stroke-width:1.5}
  </style>

  <text class="name" x="30" y="28">u_3f9c…_messages</text>
  <text class="note" x="890" y="28" text-anchor="end">one append-only stream per user</text>
  <rect class="lane" x="30" y="44" width="860" height="78" rx="12"/>
  <line x1="462" y1="40" x2="462" y2="160" stroke="#27865a" stroke-width="2" stroke-dasharray="3 4"/>

  <!-- lane 1 cells: keys a b a b c b a c b a b c a b a b -->
  <rect x="50"  y="60" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.55"/>
  <rect x="102" y="60" width="46" height="46" rx="8" fill="#0e8f7e"/>
  <rect x="154" y="60" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.55"/>
  <rect x="206" y="60" width="46" height="46" rx="8" fill="#0e8f7e"/>
  <rect x="258" y="60" width="46" height="46" rx="8" fill="#d99113" opacity="0.65"/>
  <rect x="310" y="60" width="46" height="46" rx="8" fill="#0e8f7e"/>
  <rect x="362" y="60" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.55"/>
  <rect x="414" y="60" width="46" height="46" rx="8" fill="#d99113" opacity="0.65"/>
  <rect x="466" y="60" width="46" height="46" rx="8" fill="#0e8f7e" stroke="#1a1a1e" stroke-width="2"/>
  <rect x="518" y="60" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.55"/>
  <rect x="570" y="60" width="46" height="46" rx="8" fill="#0e8f7e" stroke="#1a1a1e" stroke-width="2"/>
  <rect x="622" y="60" width="46" height="46" rx="8" fill="#d99113" opacity="0.65"/>
  <rect x="674" y="60" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.55"/>
  <rect x="726" y="60" width="46" height="46" rx="8" fill="#0e8f7e" stroke="#1a1a1e" stroke-width="2"/>
  <rect x="778" y="60" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.55"/>
  <rect x="830" y="60" width="46" height="46" rx="8" fill="#0e8f7e" stroke="#1a1a1e" stroke-width="2"/>

  <text class="note" x="50" y="146">offset 0</text>
  <text class="note" x="890" y="146" text-anchor="end">appends → live</text>
  <text class="lab" x="468" y="158">read key=chat:cows from offset 8 → only ▮▮, then live</text>

  <text class="name" x="30" y="212">u_77b2…_messages</text>
  <rect class="lane" x="30" y="226" width="860" height="78" rx="12"/>
  <rect x="50"  y="242" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.28"/>
  <rect x="102" y="242" width="46" height="46" rx="8" fill="#d99113" opacity="0.28"/>
  <rect x="154" y="242" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.28"/>
  <rect x="206" y="242" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.28"/>
  <rect x="258" y="242" width="46" height="46" rx="8" fill="#d99113" opacity="0.28"/>
  <rect x="310" y="242" width="46" height="46" rx="8" fill="#5d58c6" opacity="0.28"/>
  <text class="name" x="372" y="274">…</text>

  <!-- legend -->
  <rect x="30" y="326" width="12" height="12" rx="3" fill="#5d58c6" opacity="0.55"/>
  <text class="note" x="48" y="337">chat:cats</text>
  <rect x="124" y="326" width="12" height="12" rx="3" fill="#0e8f7e"/>
  <text class="note" x="142" y="337">chat:cows</text>
  <rect x="226" y="326" width="12" height="12" rx="3" fill="#d99113" opacity="0.65"/>
  <text class="note" x="244" y="337">chat:haiku</text>
  <text class="note" x="890" y="337" text-anchor="end">routing keys — chats interleave freely in one log</text>
</svg>
