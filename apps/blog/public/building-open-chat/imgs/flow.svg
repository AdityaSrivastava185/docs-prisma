<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="Request flow: a prompt goes from the browser to the Bun server on Prisma Compute, which asks OpenRouter; every model delta is appended to Prisma Streams before it is tailed back to the browser over SSE; chat metadata lives in Prisma Postgres.">
  <rect width="920" height="560" fill="#fbfbf9"/>
  <style>
    text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif}
    .title{fill:#1a1a1e;font-size:19px;font-weight:650}
    .sub{fill:#5c5c66;font-size:14px}
    .note{fill:#9494a0;font-size:12.5px}
    .label{fill:#5c5c66;font-size:13px;font-weight:600;paint-order:stroke;stroke:#fbfbf9;stroke-width:5;stroke-linejoin:round}
    .box{fill:#ffffff;stroke:#cfcfca;stroke-width:1.5}
    .edge{fill:none;stroke:#cfcfca;stroke-width:2;stroke-dasharray:5 6}
    .amber{stroke:#d99113}
    .green{stroke:#2e9e63}
    .l-amber{fill:#b97a0a}
    .l-green{fill:#27865a}
  </style>

  <!-- legend -->
  <circle cx="40" cy="40" r="6" fill="#5d58c6"/>
  <text class="note" x="52" y="44">the prompt</text>
  <circle cx="160" cy="40" r="6" fill="#d99113"/>
  <text class="note" x="172" y="44">model deltas</text>
  <circle cx="320" cy="40" r="6" fill="#2e9e63"/>
  <text class="note" x="332" y="44">durable append + SSE tail</text>

  <!-- boxes -->
  <rect class="box" x="30" y="170" width="220" height="150" rx="14"/>
  <text class="title" x="140" y="206" text-anchor="middle">Browser</text>
  <text class="sub" x="140" y="230" text-anchor="middle">React + TanStack DB</text>
  <text class="note" x="140" y="262" text-anchor="middle">live queries render</text>
  <text class="note" x="140" y="280" text-anchor="middle">the event log as messages</text>

  <rect class="box" x="370" y="150" width="220" height="190" rx="14"/>
  <text class="title" x="480" y="188" text-anchor="middle">Bun server</text>
  <text class="sub" x="480" y="212" text-anchor="middle">on Prisma Compute</text>
  <text class="note" x="480" y="246" text-anchor="middle">auth · ownership · budgets</text>
  <text class="note" x="480" y="264" text-anchor="middle">appends before it serves</text>

  <rect class="box" x="700" y="60" width="190" height="110" rx="14"/>
  <text class="title" x="795" y="98" text-anchor="middle">OpenRouter</text>
  <text class="sub" x="795" y="122" text-anchor="middle">any LLM, streamed</text>

  <rect class="box" x="340" y="420" width="280" height="110" rx="14" stroke="#5d58c6"/>
  <text class="title" x="480" y="458" text-anchor="middle">Prisma Streams</text>
  <text class="sub" x="480" y="482" text-anchor="middle">append-only event log</text>
  <text class="note" x="480" y="506" text-anchor="middle">one stream per user · key per chat</text>

  <rect class="box" x="700" y="420" width="190" height="110" rx="14"/>
  <text class="title" x="795" y="458" text-anchor="middle">Prisma Postgres</text>
  <text class="sub" x="795" y="482" text-anchor="middle">via Prisma Next</text>
  <text class="note" x="795" y="506" text-anchor="middle">users · chats · credits</text>

  <!-- edges -->
  <path class="edge" d="M250 215 H370"/>
  <path class="edge" d="M590 195 C650 185 650 135 700 122"/>
  <path class="edge amber" d="M700 145 C655 160 645 205 590 218"/>
  <path class="edge green" d="M480 340 V420"/>
  <path class="edge green" d="M404 420 C394 392 398 364 412 340"/>
  <path class="edge green" d="M370 262 C330 270 290 270 250 262"/>
  <path class="edge" d="M590 320 C660 360 680 400 718 420"/>

  <!-- labels -->
  <text class="label" x="310" y="203" text-anchor="middle">1 · prompt</text>
  <text class="label" x="650" y="140" text-anchor="middle">2 · ask</text>
  <text class="label l-amber" x="662" y="214" text-anchor="middle">3 · deltas</text>
  <text class="label l-green" x="496" y="392" text-anchor="start">4 · append first</text>
  <text class="label l-green" x="312" y="246" text-anchor="middle">5 · SSE tail</text>
  <text class="note" x="312" y="292" text-anchor="middle">proxied · session-checked</text>
  <text class="label" x="682" y="392" text-anchor="middle">6 · metadata</text>

  <!-- static tokens riding the edges -->
  <circle cx="295" cy="215" r="5" fill="#5d58c6"/>
  <circle cx="338" cy="215" r="5" fill="#5d58c6"/>
  <circle cx="650" cy="156" r="4.5" fill="#5d58c6"/>
  <circle cx="674" cy="135" r="4.5" fill="#5d58c6"/>
  <circle cx="664" cy="167" r="4.5" fill="#d99113"/>
  <circle cx="630" cy="196" r="4.5" fill="#d99113"/>
  <circle cx="599" cy="214" r="4.5" fill="#d99113"/>
  <circle cx="480" cy="365" r="4.5" fill="#2e9e63"/>
  <circle cx="480" cy="397" r="4.5" fill="#2e9e63"/>
  <circle cx="405" cy="398" r="4.5" fill="#2e9e63"/>
  <circle cx="409" cy="366" r="4.5" fill="#2e9e63"/>
  <circle cx="332" cy="266" r="4.5" fill="#2e9e63"/>
  <circle cx="292" cy="266" r="4.5" fill="#2e9e63"/>
  <circle cx="648" cy="360" r="4.5" fill="#5d58c6"/>
  <circle cx="690" cy="394" r="4.5" fill="#5d58c6"/>
</svg>
